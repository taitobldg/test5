name: validate-xml
on: { pull_request: { branches: [ plan-latest, asbuilt-latest, lts ] } }
permissions: { contents: read }
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install lxml
      - run: python scripts/validate_xml.py --paths tiles
